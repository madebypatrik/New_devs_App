name: Tests

on:
  push:
    branches: [main, develop, "bug/**", "feature/**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio httpx "pydantic[email]" email-validator

      - name: Run unit tests
        run: |
          python -m pytest \
            tests/test_cache_isolation.py \
            tests/test_monthly_revenue.py \
            tests/test_dashboard_precision.py \
            -v --tb=short

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    # Only run on PRs targeting main (i.e. develop → main release PRs)
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose up -d db redis backend

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend at http://localhost:8000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "Backend did not become ready in time"
          docker compose logs backend
          exit 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install E2E test dependencies
        run: pip install pytest pytest-asyncio httpx "python-jose[cryptography]" "pydantic[email]" email-validator

      - name: Run E2E tests
        working-directory: backend
        run: |
          python -m pytest tests/test_e2e_dashboard.py -v --tb=short

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend

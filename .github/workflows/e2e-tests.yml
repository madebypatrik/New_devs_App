name: E2E Tests (Release)

on:
  pull_request:
    branches: [main]

jobs:
  backend-e2e-tests:
    name: Backend E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start backend stack
        run: docker compose up -d db redis backend

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for backend at http://localhost:8000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is up"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 3s..."
            sleep 3
          done
          echo "Backend did not become ready in time"
          docker compose logs backend
          exit 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install E2E test dependencies
        run: pip install pytest pytest-asyncio httpx "python-jose[cryptography]" "pydantic[email]" email-validator

      - name: Run E2E tests
        working-directory: backend
        run: python -m pytest tests/test_e2e_dashboard.py -v --tb=short

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend
